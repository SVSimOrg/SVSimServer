# SVSimServer CI + release pipeline.
#
# Every push / PR: restore, build, run the full test suite.
# On a v*.*.* tag push: additionally publish SVSim.ContentServer and
# SVSim.EmulatedEntrypoint for win-x64 + linux-x64 (self-contained), zip each,
# and attach the four archives to a GitHub Release.
#
# Runs on ubuntu-latest. The Steamworks native libs are wired into the
# SVSim.EmulatedEntrypoint csproj as MSBuild <Copy> targets that fire after
# Build and Publish, so publish output already contains them — no shell
# fallback needed here.
name: CI

on:
  push:
    branches: [master, main]
    tags: ['v*.*.*']
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore DCGEngine.sln

      - name: Build (Release)
        run: dotnet build DCGEngine.sln --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test DCGEngine.sln
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: warn

  publish:
    name: Publish ${{ matrix.project }} (${{ matrix.rid }})
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [SVSim.ContentServer, SVSim.EmulatedEntrypoint]
        rid: [win-x64, linux-x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Derive version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish "${{ matrix.project }}/${{ matrix.project }}.csproj"
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=false
          -p:Version=${{ steps.version.outputs.value }}
          --output publish-output

      - name: Archive
        run: |
          name="${{ matrix.project }}-${{ steps.version.outputs.value }}-${{ matrix.rid }}.zip"
          (cd publish-output && zip -r "../$name" .)
          echo "artifact_name=$name" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project }}-${{ matrix.rid }}
          path: ${{ env.artifact_name }}
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          --repo "$GITHUB_REPOSITORY"
          --title "$GITHUB_REF_NAME"
          --generate-notes
          dist/*.zip
